name: P4 qPCR Cloud Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build qPCR Firmware
        run: pio run