; PlatformIO Project Configuration File for ESP32-P4 qPCR System
; -------------------------------------------------------------
; This config uses the PIOArduino fork for native P4 support.

[env:esp32-p4]
# 1. Use the community-maintained P4 platform
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4
framework = arduino

# 2. Hardware Specs (P4 is 400MHz RISC-V)
board_build.mcu = esp32p4
board_build.f_cpu = 400000000L

# 3. Libraries 
# Note: Switched from TFT_eSPI to LovyanGFX for RISC-V compatibility
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    adafruit/MAX6675 library @ ^1.1.2

# 4. Build Flags (Ensures USB Serial works for monitoring)
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

# 5. Monitor Settings
monitor_speed = 115200