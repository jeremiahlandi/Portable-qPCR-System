[env:esp32-p4-ev-board]
platform = https://github.com/platformio/platform-espressif32.git#develop
board = esp32-s3-devkitc-1
framework = arduino

# Force P4 Architecture
board_build.mcu = esp32p4
board_build.f_cpu = 400000000L

platform_packages =
    # The Core Framework
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.4
    # The missing piece: The pre-compiled libraries for RISC-V/P4
    framework-arduinoespressif32-libs @ https://github.com/espressif/esp32-arduino-lib-builder/releases/download/idf-release_v5.1/arduino-framework-libs-967a10a.tar.gz

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    adafruit/MAX6675 library @ ^1.1.2